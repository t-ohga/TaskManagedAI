# Sprint 11.5 batch 1 (BL-0134): Grafana server config.
#
# anonymous read-only (Tailscale 内のみ accessible、Pack §設計判断 line 78).
# UI 編集禁止 (provisioning は file-based のみ).
# admin user は disable 化 (anonymous only).

[server]
http_addr = 0.0.0.0
http_port = 3000
domain = localhost
root_url = http://localhost:3001/
protocol = http

[security]
allow_embedding = false
cookie_secure = false  # Tailscale 内のみ + HTTP、production VPS では reverse proxy で TLS terminate
disable_initial_admin_creation = false
admin_user = admin
# Sprint 11.5 batch 1: random で admin password を初回起動時 self-generate される.
# Tailscale 内のみ accessible のため、anonymous + Viewer role で十分 (admin path は緊急用).

[auth.anonymous]
enabled = true
org_name = Main Org.
org_role = Viewer

[users]
allow_sign_up = false
allow_org_create = false
auto_assign_org = true
auto_assign_org_role = Viewer
default_theme = dark

[snapshots]
external_enabled = false  # external snapshot.raintank.io publish 禁止

[analytics]
reporting_enabled = false
check_for_updates = false
feedback_links_enabled = false

[plugins]
allow_loading_unsigned_plugins = ""

[unified_alerting]
enabled = false  # Sprint 11.5 batch 2 BL-0135 で alerting 設定

[paths]
provisioning = /etc/grafana/provisioning
data = /var/lib/grafana

[log]
mode = console
level = info

[dashboards]
default_home_dashboard_path = /etc/grafana/provisioning/dashboards/taskmanagedai-overview.json
