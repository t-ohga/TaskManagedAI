# Sprint 11.5 batch 1 (BL-0134): Prometheus datasource provisioning.
# Codex F-PR41-004 P2 adopt: `uid: Prometheus` жҳҺзӨә (dashboard JSON гҒҢ UID hard-code).
apiVersion: 1
datasources:
  - name: Prometheus
    uid: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false  # UI з·ЁйӣҶзҰҒжӯў (Pack В§иЁӯиЁҲеҲӨж–ӯ line 78гҖҒIaC pattern)
    jsonData:
      timeInterval: 15s
      httpMethod: POST
