# Sprint 11.5 batch 1 (BL-0134): Prometheus datasource provisioning.
apiVersion: 1
datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false  # UI 編集禁止 (Pack §設計判断 line 78、IaC pattern)
    jsonData:
      timeInterval: 15s
      httpMethod: POST
