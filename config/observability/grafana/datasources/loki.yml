# Sprint 11.5 batch 1 (BL-0134): Loki datasource provisioning.
apiVersion: 1
datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: false  # UI 編集禁止 (Pack §設計判断 line 78、IaC pattern)
    jsonData:
      maxLines: 1000
      timeout: 30
