# Sprint 11.5 batch 1 (BL-0132 prerequisite): Prometheus scrape config.
#
# Scrape target: api / worker `/metrics` endpoint.
# scrape interval 15s (Pack §設計判断 line 75).

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    service: taskmanagedai

scrape_configs:
  - job_name: "taskmanagedai-api"
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "api:8000"
        labels:
          service: "taskmanagedai"
          role: "api"

  - job_name: "taskmanagedai-worker"
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "worker:8001"
        labels:
          service: "taskmanagedai"
          role: "worker"
    # worker は本 batch 0 では /metrics endpoint expose していないため scrape は
    # 起動時 timeout で skip (batch 2+ で worker /metrics 追加予定).

  - job_name: "loki"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["loki:3100"]
        labels:
          service: "loki"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
