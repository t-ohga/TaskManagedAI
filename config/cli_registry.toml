# Sprint 6 BL-0065: CLI agent registry (allowlist).
#
# 本ファイルは Sprint 6 の Subprocess Launcher 用の **正本**:
# - 起動可能な CLI binary を ``[[agents]]`` で固定列挙
# - 各 agent の `argv_template` で許可済 placeholder を限定
# - `env_passthrough` で許可済 ENV var だけ subprocess へ pass-through
#
# 採用方針 (ADR-00003):
# - Codex / Claude / 任意 CLI を **subprocess** で呼び (ProviderAdapter SDK 経由
#   ではない) 出力は artifact_kind=cli_* に保存。
# - 直接 prompt をユーザー入力で動的 expand しない (forbidden command 経路を残
#   さない、AI Output Boundary §1 + DD-04)。
# - registry に登録されていない binary や placeholder は launcher 側で deny。
#
# Sprint 6 batch 1 は registry skeleton + 1 agent (codex CLI、read-only sandbox
# 前提) を入れる。batch 2 以降で agent 数を増やす場合は ADR-00003 §B
# rollback を見直し、本 file の version を上げる。
#
# SP-PHASE0 S3 (ADR-00058、credential supply 境界): CLI サブスク credential の供給経路を
# additive field `credential_supply_mode` で明示分類する (schema_version 1.0.0 -> 1.1.0)。
# - `host_ambient`: CLI サブスク credential (claude/codex の self-rotating OAuth)。CLI 本体が
#   OAuth を所有・refresh し、host worker が `~/.claude` / `~/.codex` を **直読** する (SecretBroker
#   非経由)。broker-managed store へ登録すると refresh で即 stale になり全 run 失敗するため、
#   SecretRegistrationService._reject_self_rotating が self_rotating / host_ambient metadata を
#   broker-managed 登録で reject する (案B 罠の構造防止、ADR-00058)。raw token は本 file に書かない。
# - `broker_managed` (将来): static API key。in-process `provider.call` (ProviderAdapter HTTP) で
#   broker 内部消費、subprocess env/argv/temp-file に raw を出さない (Phase 2 実装)。
# `credential_supply_mode` 未設定 = credential 供給を持たない (read-only artifact 生成のみ、後方互換)。
# raw secret / token は本 file に **一切書かない** (env_passthrough も loader が secret 名を物理 drop)。
#
# SP-PHASE0 gate C (ADR-00058 §exit must_ship、control 2 per-agent 最小 HOME): host_ambient agent の
# subprocess に渡す **per-agent 最小 HOME** (`minimal_home_dir`) と **credential home env**
# (`credential_home_env` + `credential_home_dir`) を additive で追加 (schema_version 1.1.0 -> 1.2.0)。
# - `minimal_home_dir`: subprocess の `HOME` を本 dir へ override し、配下に他 secret を **同居させない**
#   ことで prompt-injected な `cat ~/.ssh/id_rsa` / `cat ~/.aws/...` の blast radius を最小化する。
# - `credential_home_env` + `credential_home_dir`: agent 自身の credential dir を ENV (codex は CODEX_HOME)
#   で明示供給し、agent credential 読取のみ許可する。raw token は本 file に書かない (dir path のみ)。
# 本 3 field の **shipped codex entry への配線 (実 auth.json を最小 HOME 配下へ配置する運用)** は大元計画
# Phase 2 (CLIAgentAdapter 本体) の実機検証で確定する (CODEX_HOME を指す最小 HOME の作成・auth 配置・
# symlink 戦略は実 codex 起動を伴うため Phase 0 で half-configured 出荷しない)。Phase 0 では (1) schema +
# 検証 + loader、(2) launcher の env 構築ロジック (`_build_scrubbed_env` が HOME を override し credential
# home env を set する) を unit test で確定し、(3) 出力 canary scan (control 1) で exfiltration を Hard Gate
# failure 化する。shipped codex entry は本 field 未設定 (後方互換 = 既存の parent HOME passthrough) のまま。

schema_version = "1.2.0"

[[agents]]
name = "codex"
# 物理パスは絶対指定必須 (Codex SP6B1 R2 F-SP6B1-R2-004 採用、PATH 汚染による
# 別 binary 起動を物理削除)。Mac (homebrew) のデフォルト path。Linux / VPS
# deployment では別 path となるため、Sprint 6 batch 2 で env-overlay 機構を
# 実装するまで本 file は **Mac 開発機 (`t-ohga-mac`) 専用** の値を保持する。
# host-portable 化は ADR-00021 / Sprint 6 batch 2 以降で扱う。
binary_path = "/opt/homebrew/bin/codex"
# SP-PHASE0 S3 (ADR-00058): codex CLI サブスク credential は host-ambient (CLI が CODEX_HOME=~/.codex
# の OAuth を所有・refresh、host worker が直読、broker 非経由)。raw token は本 file に出さない。
credential_supply_mode = "host_ambient"
# argv_template は placeholder のみ。launcher が placeholder を resolve する。
# 許可済 placeholder:
#   {prompt_file}: CLI 入力 prompt の絶対パス (read-only)
#   {output_file}: 最終応答書出先 (subprocess は WRITE)
#   {stream_file}: JSONL stream 書出先 (subprocess は WRITE)
argv_template = [
  "exec",
  "--sandbox",
  "read-only",
  "--profile",
  "deep-review",
  "--json",
  "--output-last-message",
  "{output_file}",
  "-",
]
stdin_source = "{prompt_file}"
# 許可済 ENV var のみ pass-through。secret 値を抜く invariant
# (`server-owned-boundary §1` / SecretBroker rules)。
env_passthrough = [
  "HOME",
  "PATH",
  "LANG",
  "LC_ALL",
  "LC_CTYPE",
  "TERM",
]
# subprocess の最大実行時間 (秒)。timeout 超過は cli_exit.timeout_reached=true。
timeout_seconds = 1800
# 最大 stdout/stderr バイト数 (各)。redaction pipeline はこれを上限とする。
max_stdout_bytes = 1048576
max_stderr_bytes = 524288
# CLI agent の最大 payload data class。Provider Compliance Matrix と同等 invariant
# で、**service layer (caller)** が artifact metadata から resolve した
# payload_data_class を本値と比較する (Sprint 6 batch 2 で artifact_ref →
# data class resolve を実装、batch 1 の launcher は boundary check の責任を持たない、
# server-owned-boundary §1: caller-supplied payload_data_class の signature 経路を物理削除)。
# 値 "internal" は: public ≤ internal ≤ internal で送れる、confidential / pii は deny。
max_payload_data_class = "internal"
# launcher 起動時の cwd allowlist。caller が指定する cwd は本 list 配下 (Path.resolve()
# 後の prefix match) でなければ deny。同時に prompt_file / output_file / stream_file
# も本 list 配下に限定 (AC-HARD-05 forbidden path enforcement の launcher 境界実装、
# server-owned-boundary §1 で path containment を server 側で強制)。
cwd_allowlist = ["/Users/tohga/repo/TaskManagedAI"]

# SP-PHASE0 S3 (ADR-00058、Codex PR #353 review F2/F3/F4/F6 adopt):
# claude CLI サブスク credential も **host-ambient** (CLI が ~/.claude の OAuth を所有・refresh、host worker が
# 直読、broker 非経由) に分類される。ただし claude を **launchable agent として登録するのは大元計画 Phase 2
# (CLIAgentAdapter 本体)** に延期する。Phase 0 で launchable entry を入れると以下が未確定 / 不正なまま出荷される
# ため (Codex review 指摘): (F2) `-p` への prompt は path でなく contents/stdin、(F3) claude は stdout へ
# stream するため launcher 側で output_file へ永続化する配線が必要、(F4) read-only 強制 (--permission-mode /
# allowlist)、(F6) backend 起動では session 永続を無効化する。これらは claude CLI 実起動を伴う Phase 2 で
# 実機検証しつつ確定する。Phase 0 の host-ambient 分類は (1) codex entry の credential_supply_mode="host_ambient"
# (machine-readable)、(2) 本コメント、で確定し、claude の launchable entry は Phase 2 で追加する。
