services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env.local
    environment:
      TASKMANAGEDAI_ENVIRONMENT: "${TASKMANAGEDAI_ENVIRONMENT:?must be set explicitly to production|development|test}"
    command: ["uv", "run", "--no-sync", "uvicorn", "backend.app.main:create_app", "--factory", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "127.0.0.1:8000:8000"
    # SP022-T02 Phase 3 (R22-F-001 + R23-F-001 adopt): artifacts bind mount で host path から
    # container 内 /app/data/artifacts を mount。restore preflight (verify_target_binding_consistency)
    # は api/worker 両方の bind mount を要求するため、必須.
    volumes:
      - ./data/artifacts:/app/data/artifacts:rw
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/readyz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - taskmanagedai_internal
      - taskmanagedai_host
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      TASKMANAGEDAI_ENVIRONMENT: "${TASKMANAGEDAI_ENVIRONMENT:?must be set explicitly to production|development|test}"
      NEXT_TELEMETRY_DISABLED: "1"
      HOSTNAME: "0.0.0.0"
      PORT: "3900"
      INTERNAL_API_URL: "http://api:8000"
      DEV_LOGIN_COOKIE_SECRET: "${TASKMANAGEDAI_DEV_LOGIN_COOKIE_SECRET:?must be set in .env.local}"
      TASKMANAGEDAI_DEV_LOGIN_TOKEN: "${TASKMANAGEDAI_DEV_LOGIN_TOKEN:-}"
    ports:
      - "127.0.0.1:3900:3900"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3900/api/healthz >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - taskmanagedai_internal
      - taskmanagedai_host
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - .env.local
    environment:
      TASKMANAGEDAI_ENVIRONMENT: "${TASKMANAGEDAI_ENVIRONMENT:?must be set explicitly to production|development|test}"
    command: ["uv", "run", "--no-sync", "arq", "backend.app.workers.main.WorkerSettings"]
    # SP022-T02 Phase 3 (R22-F-001 + R23-F-001 adopt): artifacts bind mount (api と同 path)
    volumes:
      - ./data/artifacts:/app/data/artifacts:rw
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -h redis -p 6379 ping | grep PONG >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - taskmanagedai_internal
    restart: unless-stopped

  postgres:
    # SP-001-5: image digest pinning (supply-chain 固定、ADR-00021 §11.3 / PGA-F-004)。
    # tag + manifest-list digest 併記で再現性確保 (digest は multi-arch manifest list の
    # ため arm64 Mac / amd64 Linux/VPS どちらでも platform-specific image を解決可能)。
    # 更新手順: registry の manifest-list digest を再取得し multi-arch (amd64+arm64) を確認して差し替え
    # (ADR-00021 §11.3 / PGA-F-004: digest pinning + lock file + version matrix)。
    image: postgres:16-alpine@sha256:16bc17c64a573ef34162af9298258d1aec548232985b33ed7b1eac33ba35c229
    env_file:
      - .env.local
    # DB は 127.0.0.1 loopback bind (host-local のみ、tailnet / 外部には非公開)。
    # この loopback 公開は意図的: `taskhub restore` の verify_target_binding_consistency
    # (scripts/taskhub_restore_orchestrator.py) が `127.0.0.1:5432:5432` の explicit binding を
    # 要求し、backup/restore tooling は host loopback 経由で DB へアクセスする。0.0.0.0 bind は禁止。
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER:-taskmanagedai}\" -d \"$${POSTGRES_DB:-taskmanagedai}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - taskmanagedai_internal
      - taskmanagedai_host
    restart: unless-stopped

  redis:
    # SP-001-5: image digest pinning (supply-chain 固定、ADR-00021 §11.3 / PGA-F-004)。
    # 更新手順: registry の manifest-list digest を再取得し multi-arch (amd64+arm64) を確認して差し替え
    # (ADR-00021 §11.3 / PGA-F-004: digest pinning + lock file + version matrix)。
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    command: ["redis-server", "--appendonly", "yes"]
    # Redis は 127.0.0.1 loopback bind (host-local のみ、tailnet / 外部には非公開)。
    # restore preflight (verify_target_binding_consistency) が `127.0.0.1:6379:6379` の explicit
    # binding を要求する。0.0.0.0 bind は禁止。
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - taskmanagedai_internal
      - taskmanagedai_host
    restart: unless-stopped

networks:
  taskmanagedai_internal:
    driver: bridge
    internal: true
  taskmanagedai_host:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
