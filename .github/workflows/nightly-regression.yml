name: Nightly Regression

# BL-0130 (Sprint 11 batch 5i): nightly cron で public_regression fixture +
# Gold Task v0 contract を自動実行する eval visibility layer。
#
# Boundary (本 workflow scope と Sprint 11.5 / SP-022 への defer):
#   - public_regression: 本 workflow で実行 (cron + workflow_dispatch)
#   - Gold Task v0 contract: 本 workflow で実行 (Anti-Gaming sanity / drift 検知)
#   - private_holdout monthly decryption: Sprint 11.5 / SP-022 defer
#     (age key + Tailscale GitHub Action 必要、ADR Gate Criteria #6 secrets)
#   - failure notification (Slack / Discord / MoltBot): Sprint 11.5 defer
#     (ADR Gate Criteria #4/#5 external integration)
#
# Anti-Gaming defense (継承、本 workflow で新規 surface 追加なし):
#   - 既存 loader sanitize (Sprint 11 batch 5b 確立: raw secret pattern detect)
#   - dataset_version pinning + sha256 anti-gaming guard
#   - pytest `-q --tb=short` で集約出力 (個別 fixture 期待値の test stdout
#     export なし、CI ログ leak 防止)
#   - --strict-markers で unknown marker reject (future batch で marker
#     経由 selector 追加時の preventive guard)

"on":
  schedule:
    # 03:00 UTC = 12:00 JST (off-peak、GitHub Actions runner availability 高)
    - cron: "0 3 * * *"
  workflow_dispatch: {}

# nightly は ref 単位の独立 group、cancel-in-progress=false で
# 全件 run (ci-smoke.yml の push group は commit SHA 単位独立 = PR #4 教訓
# とは別方針、nightly は last-write-wins ではない)
concurrency:
  group: nightly-regression-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  eval-nightly-regression:
    name: Eval + Gold Task v0 nightly regression
    # schedule trigger は GitHub Actions 公式仕様で default branch (main)
    # でのみ発火するが、workflow_dispatch は任意 branch から起動可能なため
    # job level if で main 限定を二重保証
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: taskmanagedai
          POSTGRES_PASSWORD: taskmanagedai
          POSTGRES_DB: taskmanagedai_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U taskmanagedai -d taskmanagedai_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping | grep PONG"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TASKMANAGEDAI_ENVIRONMENT: test
      TASKMANAGEDAI_DATABASE_URL: postgresql+asyncpg://taskmanagedai:taskmanagedai@127.0.0.1:5432/taskmanagedai_test
      TASKMANAGEDAI_REDIS_URL: redis://127.0.0.1:6379/1
      TASKMANAGEDAI_DEV_LOGIN_COOKIE_SECRET: test-cookie-secret-for-ci-only
      TASKMANAGEDAI_DEV_LOGIN_TOKEN: test-dev-login-token-for-ci-only
      TASKMANAGEDAI_RUN_DB_TESTS: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v3

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-3.12-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-3.12-

      - name: Write fixed CI env file
        run: |
          cat > .env.ci <<'ENV'
          POSTGRES_USER=taskmanagedai
          POSTGRES_PASSWORD=taskmanagedai
          POSTGRES_DB=taskmanagedai_test
          TASKMANAGEDAI_ENVIRONMENT=test
          TASKMANAGEDAI_DATABASE_URL=postgresql+asyncpg://taskmanagedai:taskmanagedai@postgres:5432/taskmanagedai_test
          TASKMANAGEDAI_REDIS_URL=redis://redis:6379/1
          TASKMANAGEDAI_DEV_LOGIN_COOKIE_SECRET=test-cookie-secret-for-ci-only
          TASKMANAGEDAI_DEV_LOGIN_TOKEN=test-dev-login-token-for-ci-only
          ENV

      - name: Install backend dependencies
        run: uv sync --locked

      - name: Ruff
        run: uv run ruff check backend tests

      - name: Mypy
        run: uv run mypy backend

      - name: Eval + Gold Task v0 nightly regression
        run: |
          uv run pytest tests/eval/ tests/runtime/test_gold_task_v0_contract.py \
            -q --tb=short --strict-markers
