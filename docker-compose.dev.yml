# SP-PHASE0 S3 (ADR-00058/00059) — dev credential supply 境界 (local Mac first):
#
# 1. DB / Redis credentials: base docker-compose.yml の `env_file: .env.local` から供給。
#    `.env.local` は **gitignored** で、commit する `.env.example` 等には raw 値ではなく
#    placeholder / SOPS-ref コメントのみを置く (raw secret 非保存、SecretBroker rules)。
#    本 dev override は env を追加せず base の供給経路をそのまま使う。
#
# 2. broker-managed provider API key (static): raw env では渡さない。`secret_ref`
#    (`secret://local/...`) を DB metadata で参照し、in-process SecretBroker が capability
#    token redeem + LocalSecretStore resolve で **broker 内部のみ**消費する (subprocess env/argv/
#    temp-file に raw を出さない、in-process `provider.call` は ADR-00058 Phase 2 で本格配線)。
#    LocalSecretStore の base dir は `TASKHUB_SECRETS_HOME` env (未設定なら ~/.taskhub/secrets)。
#
# 3. CLI サブスク credential (claude/codex の self-rotating OAuth): **host-ambient** (config/
#    cli_registry.toml の credential_supply_mode="host_ambient")。OAuth refresh を自然に動かすため
#    worker は **docker 外・host で起動** するのが Phase 0 既定 (host worker が ~/.claude / ~/.codex を
#    直読、broker 非経由)。下の docker `worker` service は broker-managed / 非 CLI 経路向け。
#    raw token を docker worker env に注入しない (cli_registry env_passthrough も secret 名を物理 drop)。
#
# loopback bind は不変: base compose の `127.0.0.1:5432/6379/8000/3900` を維持 (0.0.0.0 へ変更しない、
# ADR-00059、restore preflight verify_target_binding_consistency と整合)。
services:
  api:
    volumes:
      - ./backend:/app/backend:ro
      - ./migrations:/app/migrations:ro
      - ./alembic.ini:/app/alembic.ini:ro
      - ./pyproject.toml:/app/pyproject.toml:ro
      - ./uv.lock:/app/uv.lock:ro
    command: ["uv", "run", "--no-sync", "uvicorn", "backend.app.main:create_app", "--factory", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      TASKMANAGEDAI_ENVIRONMENT: development

  # NOTE: frontend service の dev override は削除済 (Mac single-host smoke で
  # `pnpm dev` mode + node_modules named volume init 不整合により container 起動失敗
  # = `sh: next: not found` 反復 restart)。smoke / dev 共通で base docker-compose.yml
  # の production frontend build を使う (next build → next start)。frontend hot reload
  # が必要な developer は別 mechanism (host 直接 `cd frontend && pnpm dev`) を使う.
  #
  # 関連: p0-exit-final-hardening-2026-05-22 plan §1.3 (Layer B smoke 前提条件)、
  # ADR-00022 (dev_login cookie secure attribute、development は HTTP loopback).

  worker:
    volumes:
      - ./backend:/app/backend:ro
      - ./migrations:/app/migrations:ro
      - ./alembic.ini:/app/alembic.ini:ro
      - ./pyproject.toml:/app/pyproject.toml:ro
      - ./uv.lock:/app/uv.lock:ro
    command: ["uv", "run", "--no-sync", "arq", "backend.app.workers.main.WorkerSettings"]
    environment:
      TASKMANAGEDAI_ENVIRONMENT: development

# frontend_node_modules / frontend_next named volumes は frontend dev override 削除に
# 伴い不要 (Mac smoke は base compose の production build を使う、dev developer は host
# 直接 `pnpm dev` 起動)

# Development mode override: allow host (Mac single-host smoke verification) access
# to containers via 127.0.0.1 port publish. Base docker-compose.yml sets
# `internal: true` for deny-by-default production security (Tailscale 閉域、
# Tailscale Serve TLS 終端で external access)、本 override は development /
# Mac single-host smoke 用に 127.0.0.1 限定で host access を許可する.
#
# ADR Gate 該当性: 非該当 (development environment override、production の
# `internal: true` 設定は不変、外部公開設定変更なし、127.0.0.1 bind で localhost only).
# 関連: ADR-00007 (external exposure、production は Tailscale Serve)、
# ADR-00022 (dev_login cookie secure attribute、development は HTTP loopback で動作)、
# p0-exit-final-hardening-2026-05-22 plan §1.3 (Layer B smoke 前提条件).
networks:
  taskmanagedai_internal:
    internal: false
